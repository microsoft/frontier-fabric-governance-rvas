name: validate

on:
  pull_request:
    paths:
      - 'workspaces/**'
      - 'rules/**'
      - 'schemas/**'
      - 'scripts/**'
      - '.github/workflows/validate.yml'

permissions:
  contents: read
  id-token: write       # OIDC for live tenant checks
  pull-requests: write  # sticky PR comment

jobs:
  validate:
    runs-on: [self-hosted, fabric-gov]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet -r scripts/requirements.txt
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Azure login (OIDC, optional live checks)
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Validate
        env:
          LIVE_CHECKS: ${{ vars.LIVE_CHECKS || 'false' }}
        run: python scripts/validate.py --changed-only

      - name: Sticky PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: workspace-validation
          path: validation-report.md
