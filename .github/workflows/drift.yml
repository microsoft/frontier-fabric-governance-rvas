name: drift

on:
  schedule:
    - cron: '17 3 * * *'   # daily 03:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  drift:
    runs-on: [self-hosted, fabric-gov]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet -r scripts/requirements.txt
          echo "/Users/fratei/Library/Mobile Documents/com~apple~CloudDocs/Projects/fabric-skills/fabric-workspace-governance/.venv/bin" >> $GITHUB_PATH

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Detect drift
        id: drift
        run: |
          set +e
          python scripts/drift.py
          echo "rc=$?" >> $GITHUB_OUTPUT

      - name: Open issue on drift
        if: steps.drift.outputs.rc != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Fabric workspace drift detected"
          content-filepath: drift-report.md
          labels: drift, governance
