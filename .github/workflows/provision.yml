name: provision

# ── Blueprint reference workflow — dormant in the canonical public repo ──────────────
# Applies workspace manifests on a customer-provided [self-hosted, fabric-gov] runner via
# Azure OIDC (no long-lived secrets). The canonical public repo has no such runner, so this
# workflow is DISABLED in repo settings (Actions tab) to avoid runs that queue forever.
# On its first run it creates a `production` deployment environment — configure that
# environment's approval/branch rules to gate provisioning.
# To use in a real delivery: fork/clone, register the runner + set the required repo
# variables (Azure OIDC client/tenant, Fabric capacity), then Actions → provision → "Enable".
# ─────────────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'workspaces/**'
      - 'rules/**'
      - 'scripts/**'
      - '.github/workflows/provision.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  provision:
    runs-on: [self-hosted, fabric-gov]
    environment: production   # manual approval gate (configured in repo settings)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet -r scripts/requirements.txt
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Provision workspaces
        env:
          FABRIC_CAPACITY_ID: ${{ vars.FABRIC_CAPACITY_ID }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
        run: python scripts/provision.py
