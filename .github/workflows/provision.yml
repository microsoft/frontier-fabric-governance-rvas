name: provision

on:
  push:
    branches: [main]
    paths:
      - 'workspaces/**'
      - 'rules/**'
      - 'scripts/**'
      - '.github/workflows/provision.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  provision:
    runs-on: [self-hosted, fabric-gov]
    environment: production   # manual approval gate (configured in repo settings)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet -r scripts/requirements.txt
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Provision workspaces
        env:
          FABRIC_CAPACITY_ID: ${{ vars.FABRIC_CAPACITY_ID }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
        run: python scripts/provision.py
