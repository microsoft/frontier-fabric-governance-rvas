name: provision

on:
  push:
    branches: [main]
    paths:
      - 'workspaces/**'
      - 'rules/**'
      - 'scripts/**'
      - '.github/workflows/provision.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  provision:
    runs-on: [self-hosted, fabric-gov]
    environment: production   # manual approval gate (configured in repo settings)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r scripts/requirements.txt

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Provision workspaces
        env:
          FABRIC_CAPACITY_ID: ${{ vars.FABRIC_CAPACITY_ID }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
        run: python scripts/provision.py
