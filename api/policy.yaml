# Declarative policy rules for Fabric workspace requests.
# Source of truth for naming/structure: docs/governance-rules.md
# Edit this file to evolve governance without changing scripts.

approvedCapacities:
  # logical name -> { capacityId, region, allowedEnvironments, sku }
  contoso-f2-northeurope:
    capacityId: "33333333-3333-3333-3333-333333333333"
    region: northeurope
    allowedEnvironments: [poc, dev, sit, uat, stg, prd]
    sku: F2

# 19 approved domains. All workspace manifests must reference one of these.
approvedDomains:
  - dom-seg-b2c   # Consumer (B2C) Segment Management
  - dom-seg-b2b   # Business (B2B) Segment Management
  - dom-ges-fin   # Finance
  - dom-pln-cnt   # Planning, Control & Assurance
  - dom-pss-org   # People & Organization
  - dom-ops-dat   # IT - Data Management
  - dom-eng-net   # Engineering & Network
  - dom-ops-aic   # AI
  - dom-ops-lgs   # Logistics
  - dom-ops-wfm   # Field Force
  - dom-ops-whs   # Wholesale
  - dom-cnt-ctr   # Contact Center Operations
  - dom-ops-b2b   # Business Operations
  - dom-prd-ofr   # Offer / Product
  - dom-ops-b2c   # Consumer Commercial Operations
  - dom-exp-dig   # Digital
  - dom-cmp-prv   # Compliance & Data Privacy
  - dom-reg-jur   # Regulatory, Competition & Legal
  - dom-aud-int   # Internal Audit

# Known/recommended area codes used in workspace name segment 2.
# This list is a soft allow-list (warn-level rule). Add new codes via PR.
approvedAreas:
  - intl   # AI / GenAI
  - nlyt   # Analytics
  - fops   # FinOps
  - dsci   # Data Science
  - mrkt   # Marketing

# Known/recommended subject values. Soft allow-list (warn-level rule).
# Subjects are descriptive of the data product's aspect; extend via PR.
approvedSubjects:
  - sample
  - sales
  - customer
  - finance
  - product
  - inventry
  - billing
  - network
  - usage

# ISO 3166-1 Alpha-2 country codes accepted in segment 1 of workspace name.
approvedCountries:
  - pt   # Portugal
  - fr   # France
  - es   # Spain

approvedSensitivityLabels:
  - Public
  - General
  - Confidential
  - "Highly Confidential"

approvedCostCenters:
  - CC-1001
  - CC-2042
  - CC-9999

quotas:
  # Max workspaces per owning group per environment
  perGroupPerEnv:
    poc: 50
    dev: 25
    sit: 15
    uat: 10
    stg: 10
    prd: 5

rules:
  - id: naming-convention
    severity: block
    description: "Name must match <country>-<area>-<subject>-<dataProductType>-<env>-<suffix>"
  - id: name-segments-match-fields
    severity: block
    description: "Each segment of `name` must equal the corresponding explicit field (country/area/subject/dataProductType/environment/suffix)"
  - id: capacity-allow-list
    severity: block
    description: "`capacity` must reference an entry in approvedCapacities"
  - id: capacity-allowed-for-env
    severity: block
    description: "Selected capacity must permit this environment"
  - id: region-matches-capacity
    severity: block
    description: "`region` must match the capacity's region"
  - id: country-allow-list
    severity: warn
    description: "`country` should be in approvedCountries"
  - id: area-allow-list
    severity: warn
    description: "`area` should be in approvedAreas (extend list via PR if a new area is needed)"
  - id: subject-allow-list
    severity: warn
    description: "`subject` should be in approvedSubjects (extend list via PR if a new subject is needed)"
  - id: domain-allow-list
    severity: block
    description: "`domain` must be one of the 19 approvedDomains"
  - id: subdomain-pattern
    severity: block
    description: "`subDomain` must match sdm-<area>-<product>"
  - id: owners-min-two-groups
    severity: block
    description: "At least 2 owners and at least one must be a Group"
  - id: owners-have-admin
    severity: block
    description: "At least one owner must have role=Admin"
  - id: owner-groups-exist
    severity: block
    description: "Each Group owner must exist in Entra"
  - id: owner-group-naming
    severity: warn
    description: "Group owners with `groupName` set must follow grp_<service>_<env>_<area>_<role>"
  - id: sensitivity-required
    severity: block
    description: "`sensitivityLabel` is required and must be in approvedSensitivityLabels"
  - id: cost-center-allow-list
    severity: block
    description: "`costCenter` must be in approvedCostCenters"
  - id: description-quality
    severity: block
    description: "`description` must be >= 30 chars"
  - id: no-personal-workspaces
    severity: block
    description: "Reject names containing 'my', 'personal', 'sandbox-<user>'"
  - id: prod-extra-controls
    severity: block
    description: "prd-* must use Confidential or higher sensitivity and >=2 group owners"
